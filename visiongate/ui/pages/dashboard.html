<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>VisionGate - Dashboard</title>
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/dashboard.css" />
  </head>
  <body>
    <header>
      <h1>VISIONGATE</h1>
      <span id="usuario" class="user"></span>
      <a href="/camera">Camera</a>
      <a href="/relatorio">Relatorios</a>
      <button onclick="sair()">Sair</button>
    </header>

    <div class="corpo">
      <div class="top-info">
        <p id="hora">Carregando...</p>
        <span id="dot" class="dot">*</span>
      </div>

      <div class="cards">
        <div class="card">
          <div class="valor c-green" id="c-dentro">-</div>
          <div class="label">DENTRO AGORA</div>
        </div>
        <div class="card">
          <div class="valor c-red" id="c-fora">-</div>
          <div class="label">FORA</div>
        </div>
        <div class="card">
          <div class="valor c-blue" id="c-total">-</div>
          <div class="label">CADASTRADOS</div>
        </div>
        <div class="card">
          <div class="valor c-yellow" id="c-taxa">-</div>
          <div class="label">PRESENCA</div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>NOME</th>
            <th>ACAO</th>
            <th>HORARIO</th>
          </tr>
        </thead>
        <tbody id="tabela">
          <tr>
            <td colspan="3" class="muted-center">Carregando...</td>
          </tr>
        </tbody>
      </table>

      <div class="admin-box">
        <p>ADMINISTRACAO</p>
        <div>
          <button class="btn-warn" onclick="limparEventos()">
            Limpar Historico de Eventos
          </button>
          <button class="btn-danger" onclick="limparTudo()">
            Apagar Tudo (alunos + fotos + eventos)
          </button>
        </div>
        <p id="msg-admin" class="msg-admin"></p>
      </div>

      <div class="rodape">VisionGate v2.0 - Atualiza a cada 5s</div>
    </div>

    <script src="/scripts/session.js"></script>
    <script src="/scripts/dashboard.js"></script>
  </body>
</html>
