<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>VisionGate - Login</title>
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/login.css" />
  </head>
  <body>
    <div class="card">
      <div class="logo">VISIONGATE</div>
      <div class="sub">CONTROLE DE ACESSO FACIAL</div>

      <label>USUARIO</label>
      <input id="usr" type="text" placeholder="admin" autocomplete="username" />

      <label>SENHA</label>
      <input
        id="pwd"
        type="password"
        placeholder="********"
        onkeydown="if(event.key==='Enter') entrar()"
      />

      <button class="btn" onclick="entrar()">ENTRAR</button>
      <div class="erro" id="erro"></div>

      <div class="hint">Padrao: <b>admin</b> / <b>VGate#2025</b></div>
    </div>

    <script src="/scripts/session.js"></script>
    <script src="/scripts/login.js"></script>
  </body>
</html>
